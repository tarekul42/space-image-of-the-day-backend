name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Load .env file
      run: |
        if [ -f .env ]; then
          while read -r line || [[ -n "$line" ]]; do
            if [[ ! "$line" =~ ^# && "$line" =~ = ]]; then
              echo "$line" >> $GITHUB_ENV
            fi
          done < .env
        fi

    - name: Run Lint
      run: bun run lint

    - name: Run Tests
      run: bun run test
